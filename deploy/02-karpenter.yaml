---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: kata
spec:
  amiSelectorTerms:
  - alias: al2023@latest
  blockDeviceMappings:
  - deviceName: /dev/xvda
    ebs:
      encrypted: true
      volumeSize: 500Gi
      volumeType: gp3
  role: <EKS_CLUSTER_NAME>
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: <EKS_CLUSTER_NAME>
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: <EKS_CLUSTER_NAME>
  tags:
    karpenter.sh/discovery: <EKS_CLUSTER_NAME>
  userData: |
    #!/bin/bash
    set -ex

    DATA_DIR=/var/lib/containerd/io.containerd.snapshotter.v1.devmapper
    POOL_NAME=devpool
    CONTAINERD_CONF=/etc/containerd/config.toml

    # --- Step 1: Create devmapper thin-pool (required for kata-qemu virtiofs) ---
    mkdir -p ${DATA_DIR}

    if [ ! -s "${DATA_DIR}/data" ]; then
      truncate -s 100G "${DATA_DIR}/data"
    fi
    if [ ! -s "${DATA_DIR}/meta" ]; then
      truncate -s 40G "${DATA_DIR}/meta"
    fi

    DATA_DEV=$(losetup --find --show "${DATA_DIR}/data")
    META_DEV=$(losetup --find --show "${DATA_DIR}/meta")

    SECTOR_SIZE=512
    DATA_SIZE=$(blockdev --getsize64 -q ${DATA_DEV})
    LENGTH_IN_SECTORS=$((DATA_SIZE / SECTOR_SIZE))

    if ! dmsetup ls | grep -q "$POOL_NAME"; then
      dmsetup create "${POOL_NAME}" \
        --table "0 ${LENGTH_IN_SECTORS} thin-pool ${META_DEV} ${DATA_DEV} 128 32768"
    fi

    # --- Step 2: Disable discard_unpacked_layers (required for multi-snapshotter) ---
    if [ -f "$CONTAINERD_CONF" ]; then
      sed -i 's/discard_unpacked_layers = true/discard_unpacked_layers = false/' "$CONTAINERD_CONF"
    fi

    # --- Step 3: Add devmapper snapshotter config to containerd ---
    if ! grep -q "devmapper" "$CONTAINERD_CONF" 2>/dev/null; then
      cat >> "$CONTAINERD_CONF" <<'CONF'

    [plugins."io.containerd.snapshotter.v1.devmapper"]
    pool_name = "devpool"
    root_path = "/var/lib/containerd/io.containerd.snapshotter.v1.devmapper"
    base_image_size = "40GB"
    CONF
    fi

    # --- Step 4: Create reload script and systemd service for reboot persistence ---
    cat > "${DATA_DIR}/reload.sh" <<'RELOAD'
    #!/bin/bash
    set -e
    DATA_DIR=/var/lib/containerd/io.containerd.snapshotter.v1.devmapper
    POOL_NAME=devpool
    if dmsetup ls | grep -q "$POOL_NAME"; then exit 0; fi
    DATA_DEV=$(losetup --find --show "${DATA_DIR}/data")
    META_DEV=$(losetup --find --show "${DATA_DIR}/meta")
    DATA_SIZE=$(blockdev --getsize64 -q ${DATA_DEV})
    LENGTH_IN_SECTORS=$((DATA_SIZE / 512))
    dmsetup create "${POOL_NAME}" --table "0 ${LENGTH_IN_SECTORS} thin-pool ${META_DEV} ${DATA_DEV} 128 32768"
    RELOAD
    chmod +x "${DATA_DIR}/reload.sh"

    cat > /etc/systemd/system/devmapper-reload.service <<'SVC'
    [Unit]
    Description=Reload devmapper thin-pool for containerd
    Before=containerd.service

    [Service]
    Type=oneshot
    ExecStart=/var/lib/containerd/io.containerd.snapshotter.v1.devmapper/reload.sh

    [Install]
    WantedBy=multi-user.target
    SVC
    systemctl daemon-reload
    systemctl enable devmapper-reload.service

    echo "devmapper setup complete"

---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: kata-metal
spec:
  disruption:
    consolidateAfter: 60s
    consolidationPolicy: WhenEmpty
  template:
    metadata:
      labels:
        katacontainers.io/kata-runtime: "true"
    spec:
      expireAfter: 720h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: kata
      requirements:
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m", "r"]
      - key: karpenter.k8s.aws/instance-size
        operator: In
        values: ["metal"]
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["5"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      taints:
      - key: kata-runtime
        value: "true"
        effect: NoSchedule

---
# EC2NodeClass for arm64 (Graviton) bare metal Kata nodes.
# Identical to x86 kata EC2NodeClass, but adds a systemd service in userData
# that auto-patches static_sandbox_resource_mgmt=true after kata-deploy installs.
# This works around arm64's lack of ACPI CPU hotplug support.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: kata-arm64
spec:
  amiSelectorTerms:
  - alias: al2023@latest
  blockDeviceMappings:
  - deviceName: /dev/xvda
    ebs:
      encrypted: true
      volumeSize: 500Gi
      volumeType: gp3
  role: <EKS_CLUSTER_NAME>
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: <EKS_CLUSTER_NAME>
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: <EKS_CLUSTER_NAME>
  tags:
    karpenter.sh/discovery: <EKS_CLUSTER_NAME>
  userData: |
    #!/bin/bash
    set -ex

    DATA_DIR=/var/lib/containerd/io.containerd.snapshotter.v1.devmapper
    POOL_NAME=devpool
    CONTAINERD_CONF=/etc/containerd/config.toml

    # --- Step 1: Create devmapper thin-pool (required for kata-qemu virtiofs) ---
    mkdir -p ${DATA_DIR}

    if [ ! -s "${DATA_DIR}/data" ]; then
      truncate -s 100G "${DATA_DIR}/data"
    fi
    if [ ! -s "${DATA_DIR}/meta" ]; then
      truncate -s 40G "${DATA_DIR}/meta"
    fi

    DATA_DEV=$(losetup --find --show "${DATA_DIR}/data")
    META_DEV=$(losetup --find --show "${DATA_DIR}/meta")

    SECTOR_SIZE=512
    DATA_SIZE=$(blockdev --getsize64 -q ${DATA_DEV})
    LENGTH_IN_SECTORS=$((DATA_SIZE / SECTOR_SIZE))

    if ! dmsetup ls | grep -q "$POOL_NAME"; then
      dmsetup create "${POOL_NAME}" \
        --table "0 ${LENGTH_IN_SECTORS} thin-pool ${META_DEV} ${DATA_DEV} 128 32768"
    fi

    # --- Step 2: Disable discard_unpacked_layers (required for multi-snapshotter) ---
    if [ -f "$CONTAINERD_CONF" ]; then
      sed -i 's/discard_unpacked_layers = true/discard_unpacked_layers = false/' "$CONTAINERD_CONF"
    fi

    # --- Step 3: Add devmapper snapshotter config to containerd ---
    if ! grep -q "devmapper" "$CONTAINERD_CONF" 2>/dev/null; then
      cat >> "$CONTAINERD_CONF" <<'CONF'

    [plugins."io.containerd.snapshotter.v1.devmapper"]
    pool_name = "devpool"
    root_path = "/var/lib/containerd/io.containerd.snapshotter.v1.devmapper"
    base_image_size = "40GB"
    CONF
    fi

    # --- Step 4: Create reload script and systemd service for reboot persistence ---
    cat > "${DATA_DIR}/reload.sh" <<'RELOAD'
    #!/bin/bash
    set -e
    DATA_DIR=/var/lib/containerd/io.containerd.snapshotter.v1.devmapper
    POOL_NAME=devpool
    if dmsetup ls | grep -q "$POOL_NAME"; then exit 0; fi
    DATA_DEV=$(losetup --find --show "${DATA_DIR}/data")
    META_DEV=$(losetup --find --show "${DATA_DIR}/meta")
    DATA_SIZE=$(blockdev --getsize64 -q ${DATA_DEV})
    LENGTH_IN_SECTORS=$((DATA_SIZE / 512))
    dmsetup create "${POOL_NAME}" --table "0 ${LENGTH_IN_SECTORS} thin-pool ${META_DEV} ${DATA_DEV} 128 32768"
    RELOAD
    chmod +x "${DATA_DIR}/reload.sh"

    cat > /etc/systemd/system/devmapper-reload.service <<'SVC'
    [Unit]
    Description=Reload devmapper thin-pool for containerd
    Before=containerd.service

    [Service]
    Type=oneshot
    ExecStart=/var/lib/containerd/io.containerd.snapshotter.v1.devmapper/reload.sh

    [Install]
    WantedBy=multi-user.target
    SVC

    # --- Step 5: Kata arm64 static sandbox config ---
    # kata-deploy writes the config file after node registration.
    # This service polls for the file and patches static_sandbox_resource_mgmt=true.
    cat > /usr/local/bin/kata-arm64-config.sh <<'KATA_SCRIPT'
    #!/bin/bash
    set -e
    CONF=/opt/kata/share/defaults/kata-containers/configuration-qemu.toml
    for i in $(seq 1 120); do
      if [ -f "$CONF" ]; then
        sed -i 's/^static_sandbox_resource_mgmt = false/static_sandbox_resource_mgmt = true/' "$CONF"
        echo "kata arm64: static_sandbox_resource_mgmt=true patched"
        exit 0
      fi
      sleep 5
    done
    echo "kata arm64: timeout waiting for kata config file"
    exit 1
    KATA_SCRIPT
    chmod +x /usr/local/bin/kata-arm64-config.sh

    cat > /etc/systemd/system/kata-arm64-config.service <<'KATA_SVC'
    [Unit]
    Description=Patch Kata config for arm64 static sandbox resource management
    After=containerd.service

    [Service]
    Type=oneshot
    RemainAfterExit=true
    ExecStart=/usr/local/bin/kata-arm64-config.sh

    [Install]
    WantedBy=multi-user.target
    KATA_SVC

    systemctl daemon-reload
    systemctl enable devmapper-reload.service
    systemctl enable kata-arm64-config.service
    systemctl start kata-arm64-config.service &

    echo "devmapper + kata-arm64-config setup complete"

---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: kata-metal-arm64
spec:
  disruption:
    consolidateAfter: 300s
    consolidationPolicy: WhenEmpty
  template:
    metadata:
      labels:
        katacontainers.io/kata-runtime: "true"
    spec:
      expireAfter: 720h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: kata-arm64
      requirements:
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m", "r"]
      - key: karpenter.k8s.aws/instance-size
        operator: In
        values: ["metal"]
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["6"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]
      - key: kubernetes.io/arch
        operator: In
        values: ["arm64"]
      taints:
      - key: kata-runtime
        value: "true"
        effect: NoSchedule
  weight: 10
